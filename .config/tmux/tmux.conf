setw -g mode-keys vi
setw -g mouse on

# set the prefix to C-a instead of C-b
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set-option -g allow-rename off
set-option -g pane-border-status top
set-option -g pane-border-format " [ ###P #T ] "

# fixes the weird behavior in vim where escape becomes an alt modifier key
set -s escape-time 0

